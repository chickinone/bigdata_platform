# Batch (Iceberg): Silver Parquet -> bang Iceberg (CTAS). Tach phan CTAS ra khoi
# demo silver_to_iceberg.py (demo time-travel/schema-evolution giu lam tai lieu day hoc).
# output.format=iceberg -> runner cau hinh catalog REST + writeTo().createOrReplace().
name: iceberg_silver_enriched
engine: spark_sql
layer: silver

inputs:
  - { view: silver_source, path: "s3a://data-lake-silver/enriched_transactions/" }

# CTAS: sao Silver sang Iceberg. Iceberg tu quan schema/snapshot/time-travel.
sql: |
  SELECT * FROM silver_source

output:
  format: iceberg
  table: lakehouse.silver.enriched_transactions
  mode: overwrite
