# Batch (Gold 2): chi so tron doi cua khach hang. Thay GOLD 2 trong build_gold_layer.py.
name: gold_customer_lifetime_metrics
engine: spark_sql
layer: gold

inputs:
  - { view: silver, path: "s3a://data-lake-silver/enriched_transactions/" }

sql: |
  SELECT
    customer_id, customer_name, country_code, kyc_status, risk_score,
    count(transaction_id)      AS total_txn_count,
    sum(CAST(amount AS DOUBLE)) AS lifetime_value,
    avg(CAST(amount AS DOUBLE)) AS avg_txn_amount,
    max(posted_at)             AS last_activity,
    min(posted_at)             AS first_activity,
    count(DISTINCT account_id) AS account_count
  FROM silver
  GROUP BY customer_id, customer_name, country_code, kyc_status, risk_score

output:
  path: "s3a://data-lake-gold/customer_lifetime_metrics/"
  format: parquet
  mode: overwrite
  # Khong partition (nhu job cu) — bang nho, chieu khach hang.
  columns:
    - { name: customer_id,     type: long }
    - { name: customer_name,   type: string, pii: true }
    - { name: country_code,    type: string }
    - { name: kyc_status,      type: string }
    - { name: risk_score,      type: int }
    - { name: total_txn_count, type: long }
    - { name: lifetime_value,  type: double }
    - { name: avg_txn_amount,  type: double }
    - { name: last_activity,   type: timestamp }
    - { name: first_activity,  type: timestamp }
    - { name: account_count,   type: long }
