# Connection: Iceberg lakehouse (REST catalog + S3/MinIO). Trino query time-travel.
name: iceberg_lakehouse
type: iceberg
description: Lakehouse Iceberg — bảng lake dạng table format (snapshot, time travel).

trino:
  catalog: iceberg
  connector: iceberg
  properties:
    iceberg.catalog.type: rest
    iceberg.rest-catalog.uri: "${ENV:ICEBERG_REST_URI}"
    iceberg.rest-catalog.warehouse: "${ENV:ICEBERG_WAREHOUSE}"
    hive.s3.endpoint: "${ENV:S3_ENDPOINT}"
    hive.s3.path-style-access: "${ENV:S3_PATH_STYLE_ACCESS}"
    hive.s3.aws-access-key: "${ENV:S3_ACCESS_KEY}"
    hive.s3.aws-secret-key: "${ENV:S3_SECRET_KEY}"
    hive.s3.ssl.enabled: "${ENV:S3_SSL_ENABLED}"
